name: Build installable binaries

on:
  workflow_dispatch:
    inputs:
      bundle_model:
        description: "Download and bundle a local Whisper model into assets/models"
        required: false
        type: boolean
        default: false
      model_url:
        description: "Optional model download URL (used only when bundle_model=true)"
        required: false
        type: string
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-installers:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: ${{ hashFiles('package.json') != '' && hashFiles('src-tauri/Cargo.toml') != '' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Optionally bundle local model
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.bundle_model }}
        shell: bash
        run: |
          mkdir -p assets/models
          MODEL_URL="${{ inputs.model_url }}"
          if [ -z "$MODEL_URL" ]; then
            echo "bundle_model is true but no model_url provided."
            echo "Specify model_url in workflow dispatch inputs with a direct downloadable URL."
            exit 1
          fi
          curl -L --fail "$MODEL_URL" -o assets/models/whisper-model.bin || {
            curl_exit_code=$?
            echo "Failed to download model from $MODEL_URL (curl exit code: $curl_exit_code)."
            echo "Check URL validity, network reachability, and any required authentication."
            exit 1
          }

      - name: Build installers (Tauri)
        run: npm run tauri build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
          if-no-files-found: error
